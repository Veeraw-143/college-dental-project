<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- Background -->
  <rect width="300" height="200" fill="#f8fafc"/>
  
  <!-- Logo text and design -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2fa4a9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e7c81;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tooth symbol -->
  <path d="M 75 40 Q 75 30 85 30 Q 95 30 95 40 L 95 100 Q 95 120 85 120 Q 75 120 75 100 Z" fill="url(#grad1)" stroke="#1e7c81" stroke-width="2"/>
  
  <!-- Smile/Dental symbol -->
  <circle cx="105" cy="65" r="8" fill="#2fa4a9"/>
  <circle cx="145" cy="65" r="8" fill="#2fa4a9"/>
  <path d="M 105 80 Q 125 95 145 80" stroke="#2fa4a9" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Text: "Surabi" -->
  <text x="60" y="150" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#grad1)" text-anchor="middle">Surabi</text>
  
  <!-- Text: "Dental Clinic" -->
  <text x="60" y="175" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Dental Clinic</text>
</svg>
